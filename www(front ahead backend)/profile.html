<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FileShare - Мой профиль</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Общая панель навигации -->
    <nav class="navbar">
        <div class="nav-brand">FileShare</div>
        <div class="nav-links">
            <a href="index.html">Главная</a>
            <a href="files.html">Файлы</a>
            <a href="about.html">О нас</a>
            <a href="download.html">Скачать</a>
            <a href="saved-users.html">Пользователи</a>
            <a href="profile.html" class="active">Профиль</a>
        </div>
        <div class="nav-actions">
            <button class="notification-btn" id="notificationBtn" title="Уведомления">
                🔔
                <span class="notification-badge">3</span>
            </button>
            <a href="profile.html" class="avatar-link">
                <img src="" alt="User" class="avatar" id="userAvatar">
            </a>
        </div>
    </nav>

    <!-- Контейнер для уведомлений -->
    <div class="notification-container" id="notificationContainer"></div>

    <!-- Основной контент -->
    <main class="main-content">
        <div class="profile-section">
            <div class="profile-header">
                <img src="" alt="Avatar" class="profile-avatar">
                <h2>Мой профиль</h2>
            </div>
            
            <div class="profile-info">
                <div class="info-field editable">
                    <label>Логин:</label>
                    <input type="text" value="Ivan_Petrov" readonly>
                    <button class="edit-btn">✏️</button>
                    <button class="save-btn" style="display: none;">Сохранить</button>
                </div>
                
                <div class="info-field">
                    <label>ID:</label>
                    <span>12345</span>
                </div>
                
                <div class="info-field editable">
                    <label>Местоположение:</label>
                    <input type="text" value="Москва, Россия" readonly>
                    <button class="edit-btn">✏️</button>
                    <button class="save-btn" style="display: none;">Сохранить</button>
                </div>
                
                <div class="info-field editable">
                    <label>Email:</label>
                    <input type="email" value="ivan@example.com" readonly>
                    <button class="edit-btn">✏️</button>
                    <button class="save-btn" style="display: none;">Сохранить</button>
                </div>
            </div>
            
            <button class="logout-btn">Выйти</button>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>

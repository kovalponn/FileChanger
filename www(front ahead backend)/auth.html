<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FileShare - Вход</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Основной контент -->
    <main class="auth-page">
        <div class="auth-container">
            <div class="auth-header">
                <h1>FileShare</h1>
            </div>
            
            <div class="auth-tabs">
                <button class="auth-tab active" data-tab="login">Вход</button>
                <button class="auth-tab" data-tab="register">Регистрация</button>
            </div>
            
            <!-- Форма входа -->
            <form class="auth-form" id="loginForm">
                <div class="form-group">
                    <label for="loginUsername">Логин</label>
                    <input type="text" id="loginUsername" required>
                </div>
                
                <div class="form-group">
                    <label for="loginPassword">Пароль</label>
                    <input type="password" id="loginPassword" required>
                </div>
                
                <a href="#" class="forgot-password">Забыли пароль?</a>
                
                <button type="submit" class="auth-submit-btn">Войти</button>
            </form>
            
            <!-- Форма регистрации (скрыта по умолчанию) -->
            <form class="auth-form" id="registerForm" style="display: none;">
                <div class="form-group">
                    <label for="registerUsername">Логин</label>
                    <input type="text" id="registerUsername" required>
                </div>
                
                <div class="form-group">
                    <label for="registerEmail">Email</label>
                    <input type="email" id="registerEmail" required>
                </div>
                
                <div class="form-group">
                    <label for="registerPassword">Пароль</label>
                    <input type="password" id="registerPassword" required>
                </div>
                
                <button type="submit" class="auth-submit-btn">Зарегистрироваться</button>
            </form>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>

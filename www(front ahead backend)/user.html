<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FileShare - Пользователь</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Общая панель навигации -->
    <nav class="navbar">
        <div class="nav-brand">FileShare</div>
        <div class="nav-links">
            <a href="index.html">Главная</a>
            <a href="files.html">Файлы</a>
            <a href="about.html">О нас</a>
            <a href="download.html">Скачать</a>
            <a href="saved-users.html">Пользователи</a>
            <a href="profile.html">Профиль</a>
        </div>
        <div class="nav-actions">
            <button class="notification-btn" id="notificationBtn" title="Уведомления">
                🔔
                <span class="notification-badge">3</span>
            </button>
            <a href="profile.html" class="avatar-link">
                <img src="" alt="User" class="avatar" id="userAvatar">
            </a>
        </div>
    </nav>

    <!-- Контейнер для уведомлений -->
    <div class="notification-container" id="notificationContainer"></div>

    <!-- Основной контент -->
    <main class="main-content">
        <div class="profile-section">
            <div class="profile-header">
                <img src="" alt="Avatar" class="profile-avatar">
                <h2>Maria_Smirnova</h2>
            </div>
            
            <div class="profile-info">
                <div class="info-field">
                    <label>Логин:</label>
                    <span>Maria_Smirnova</span>
                </div>
                
                <div class="info-field">
                    <label>ID:</label>
                    <span>67890</span>
                </div>
                
                <div class="info-field">
                    <label>Местоположение:</label>
                    <span>Санкт-Петербург, Россия</span>
                </div>
                
                <div class="info-field">
                    <label>Статус:</label>
                    <span class="online-status">В сети</span>
                </div>
            </div>
            
            <button class="save-user-btn">Сохранить</button>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
